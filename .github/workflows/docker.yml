name: Build and Publish Docker Image
on:
  push:
    branches:
      - main
permissions:
  contents: read
  packages: write
env:
  IMAGE_NAME: devops-flask-postgres
  IMAGE_TAG: 2.0.0
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir e Inyectar Tags de Imagen
        run: |
          # Convertir el nombre a minúsculas para evitar errores de Docker con usuarios que tengan mayúsculas
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -t ghcr.io/${REPO_LOWER}:${{ env.IMAGE_TAG }} \
            -t ghcr.io/${REPO_LOWER}:latest .
            
          docker push ghcr.io/${REPO_LOWER}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${REPO_LOWER}:latest